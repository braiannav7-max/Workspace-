<!DOCTYPE html>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<body class="bg-white text-slate-900 antialiased">

  <section class="relative overflow-hidden bg-gradient-to-br from-indigo-600 via-purple-600 to-fuchsia-600">

    <div class="absolute inset-0 bg-black/20"></div>

        </span>
        <h2 class="mx-auto mt-6 max-w-3xl text-4xl font-extrabold tracking-tight sm:text-5xl">

        </p>
        <div class="mt-9 flex flex-col items-center justify-center gap-3 sm:flex-row">

            Quiero mi acceso
          </a>
          <a href="#"
             class="inline-flex w-full items-center justify-center rounded-xl border border-white/60 px-7 py-3.5 text-sm font-semibold text-white transition hover:bg-white/10 focus:outline-none focus-visible:ring-2 focus-visible:ring-white focus-visible:ring-offset-2 focus-visible:ring-offset-purple-600 sm:w-auto">
            Ver demo
          </a>
        </div>
      </div>
    </div>
  </section>

  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script>AOS.init({ duration: 600, once: true });</script>
