<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario — Contacto</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','ui-sans-serif','system-ui','sans-serif']}}}}</script>
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
</head>
<body class="bg-white text-slate-900 antialiased">

  <section class="mx-auto max-w-7xl px-6 py-20">
    <div class="grid grid-cols-1 gap-12 lg:grid-cols-2 lg:gap-16">

      <!-- Columna izquierda: info de contacto -->
      <div data-aos="fade-right">
        <h2 class="text-3xl font-extrabold tracking-tight text-slate-900 sm:text-4xl">Hablemos</h2>
        <p class="mt-4 max-w-md text-lg text-slate-600">
          ¿Tenés una idea, un proyecto o una consulta? Escribinos y te respondemos a la brevedad.
        </p>

        <ul class="mt-10 space-y-6">
          <!-- Email -->
          <li class="flex items-start gap-4">
            <span class="flex h-11 w-11 flex-none items-center justify-center rounded-lg bg-indigo-50 text-indigo-600">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="h-5 w-5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75" />
              </svg>
            </span>
            <div>
              <p class="text-sm font-semibold text-slate-900">Email</p>
              <a href="mailto:hola@tuempresa.com" class="text-slate-600 hover:text-indigo-600">hola@tuempresa.com</a>
            </div>
          </li>

          <!-- Teléfono -->
          <li class="flex items-start gap-4">
            <span class="flex h-11 w-11 flex-none items-center justify-center rounded-lg bg-indigo-50 text-indigo-600">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="h-5 w-5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 0 0 2.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 0 1-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 0 0-1.091-.852H4.5A2.25 2.25 0 0 0 2.25 4.5v2.25Z" />
              </svg>
            </span>
            <div>
              <p class="text-sm font-semibold text-slate-900">Teléfono</p>
              <a href="tel:+5491100000000" class="text-slate-600 hover:text-indigo-600">+54 9 11 0000-0000</a>
            </div>
          </li>

          <!-- Ubicación -->
          <li class="flex items-start gap-4">
            <span class="flex h-11 w-11 flex-none items-center justify-center rounded-lg bg-indigo-50 text-indigo-600">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="h-5 w-5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z" />
              </svg>
            </span>
            <div>
              <p class="text-sm font-semibold text-slate-900">Ubicación</p>
              <p class="text-slate-600">Buenos Aires, Argentina</p>
            </div>
          </li>
        </ul>
      </div>

      <!-- Columna derecha: formulario -->
      <div data-aos="fade-left">
        <form id="form-contacto" class="rounded-2xl border border-slate-200 p-6 shadow-sm sm:p-8" novalidate>
          <div class="grid grid-cols-1 gap-5">
            <div>
              <label for="nombre" class="mb-1.5 block text-sm font-medium text-slate-700">Nombre</label>
              <input type="text" id="nombre" name="nombre" required autocomplete="name"
                placeholder="Tu nombre"
                class="w-full rounded-lg border border-slate-300 px-4 py-2.5 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
            </div>

            <div>
              <label for="email" class="mb-1.5 block text-sm font-medium text-slate-700">Email</label>
              <input type="email" id="email" name="email" required autocomplete="email"
                placeholder="tu@email.com"
                class="w-full rounded-lg border border-slate-300 px-4 py-2.5 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
            </div>

            <div>
              <label for="asunto" class="mb-1.5 block text-sm font-medium text-slate-700">Asunto</label>
              <input type="text" id="asunto" name="asunto" required
                placeholder="¿En qué te ayudamos?"
                class="w-full rounded-lg border border-slate-300 px-4 py-2.5 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
            </div>

            <div>
              <label for="mensaje" class="mb-1.5 block text-sm font-medium text-slate-700">Mensaje</label>
              <textarea id="mensaje" name="mensaje" rows="5" required
                placeholder="Contanos más..."
                class="w-full rounded-lg border border-slate-300 px-4 py-2.5 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none resize-y"></textarea>
            </div>

            <button type="submit"
              class="inline-flex w-full items-center justify-center rounded-lg bg-indigo-600 px-5 py-3 text-sm font-semibold text-white transition hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
              Enviar
            </button>
          </div>

          <!-- Mensaje de éxito (oculto por defecto) -->
          <div id="form-exito" class="mt-5 hidden rounded-lg border border-green-200 bg-green-50 px-4 py-3 text-sm text-green-800">
            ¡Gracias! Recibimos tu mensaje y te responderemos pronto.
          </div>
        </form>
      </div>

    </div>
  </section>

  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script>AOS.init({ duration: 600, once: true });</script>
  <script>
    // Demo: previene el envío real y muestra mensaje de éxito.
    // En producción, conectar a un backend/endpoint.
    (function () {
      const form = document.getElementById('form-contacto');
      const exito = document.getElementById('form-exito');
      form.addEventListener('submit', function (e) {
        e.preventDefault();
        if (!form.checkValidity()) {
          form.reportValidity();
          return;
        }
        form.reset();
        exito.classList.remove('hidden');
        exito.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      });
    })();
  </script>
</body>
</html>
