<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero — Aurora animada</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','ui-sans-serif','system-ui','sans-serif']}}}}</script>
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
  <style>
    /* Aurora: blobs de gradiente que se mueven en loop */
    @keyframes aurora1 { 0%,100%{ transform:translate(-10%,-10%) scale(1);} 50%{ transform:translate(15%,10%) scale(1.3);} }
    @keyframes aurora2 { 0%,100%{ transform:translate(10%,5%) scale(1.2);} 50%{ transform:translate(-15%,-10%) scale(1);} }
    @keyframes aurora3 { 0%,100%{ transform:translate(0,10%) scale(1.1);} 50%{ transform:translate(10%,-15%) scale(1.4);} }
    .blob{ position:absolute; border-radius:9999px; filter:blur(80px); opacity:.55; }
    .blob-1{ width:36rem; height:36rem; background:#6366f1; top:-8rem; left:-6rem; animation:aurora1 14s ease-in-out infinite; }
    .blob-2{ width:32rem; height:32rem; background:#d946ef; bottom:-10rem; right:-6rem; animation:aurora2 18s ease-in-out infinite; }
    .blob-3{ width:28rem; height:28rem; background:#0ea5e9; top:30%; left:40%; animation:aurora3 16s ease-in-out infinite; }
  </style>
</head>
<body class="bg-slate-950 text-white antialiased">

  <!-- ===== BLOQUE: hero · variante aurora ===== -->
  <!-- Fuente: patrón propio (aurora CSS) · base HyperUI · Licencia: MIT -->
  <section class="relative flex min-h-screen items-center justify-center overflow-hidden px-6">
    <!-- Aurora de fondo -->
    <div class="pointer-events-none absolute inset-0">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
      <div class="blob blob-3"></div>
    </div>
    <!-- velo para legibilidad -->
    <div class="pointer-events-none absolute inset-0 bg-slate-950/40"></div>

    <div class="relative max-w-3xl text-center" data-aos="fade-up">
      <span class="inline-block rounded-full border border-white/20 bg-white/10 px-4 py-1.5 text-xs font-semibold backdrop-blur">✨ Presentamos la versión 2026</span>
      <h1 class="mt-6 text-5xl font-extrabold leading-tight tracking-tight sm:text-7xl">
        Ideas que
        <span class="bg-gradient-to-r from-indigo-300 via-fuchsia-300 to-sky-300 bg-clip-text text-transparent">brillan</span>
        de verdad
      </h1>
      <p class="mx-auto mt-6 max-w-xl text-lg text-slate-300">
        Una experiencia que se siente premium desde el primer segundo. Captá la atención
        y no la sueltes.
      </p>
      <div class="mt-10 flex flex-col items-center justify-center gap-3 sm:flex-row">
        <a href="#" class="rounded-lg bg-white px-7 py-3 font-semibold text-slate-900 transition hover:bg-slate-100">Empezar ahora</a>
        <a href="#" class="rounded-lg border border-white/25 px-7 py-3 font-semibold text-white transition hover:bg-white/10">Ver demo</a>
      </div>
    </div>
  </section>

  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script>AOS.init({ duration: 700, once: true });</script>
</body>
</html>
