<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero — Fullscreen</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','ui-sans-serif','system-ui','sans-serif']}}}}</script>
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
</head>
<body class="bg-white text-slate-900 antialiased">

  <!-- ===== BLOQUE: hero · variante 1 (fullscreen) ===== -->
  <!-- Fuente: HyperUI · Licencia: MIT -->
  <section class="min-h-screen flex items-center bg-gradient-to-b from-indigo-50 via-white to-white">
    <div class="mx-auto max-w-7xl px-6 py-24 text-center">
      <h1 data-aos="fade-up" data-aos-delay="0" class="text-5xl sm:text-6xl font-extrabold tracking-tight text-slate-900">
        Construí productos que tus clientes amen
      </h1>
      <p data-aos="fade-up" data-aos-delay="100" class="mx-auto mt-6 max-w-2xl text-lg text-slate-600">
        Una plataforma simple, rápida y elegante para lanzar tu próxima idea. Diseñada para equipos que quieren avanzar sin fricción.
      </p>
      <div data-aos="fade-up" data-aos-delay="200" class="mt-10 flex flex-col sm:flex-row items-center justify-center gap-4">
        <a href="#" class="inline-flex items-center justify-center rounded-lg bg-indigo-600 px-6 py-3 text-base font-semibold text-white shadow-sm transition hover:bg-indigo-700">
          Comenzar gratis
        </a>
        <a href="#" class="inline-flex items-center justify-center rounded-lg border border-slate-300 bg-white px-6 py-3 text-base font-semibold text-slate-700 shadow-sm transition hover:bg-slate-50">
          Ver demo
        </a>
      </div>
    </div>
  </section>
  <!-- ===== FIN BLOQUE ===== -->

  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script>AOS.init({ duration: 600, once: true });</script>
</body>
</html>
