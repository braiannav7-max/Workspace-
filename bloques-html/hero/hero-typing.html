<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero — Texto typing</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','ui-sans-serif','system-ui','sans-serif']}}}}</script>
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
  <style>
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0;} }
    .cursor{ display:inline-block; width:3px; margin-left:2px; background:#4f46e5; animation:blink 1s step-end infinite; }
  </style>
</head>
<body class="bg-white text-slate-900 antialiased">

  <!-- ===== BLOQUE: hero · variante typing ===== -->
  <!-- Fuente: patrón propio (typewriter JS) · base HyperUI · Licencia: MIT -->
  <section class="relative flex min-h-screen items-center justify-center overflow-hidden bg-gradient-to-b from-indigo-50 to-white px-6">
    <!-- grilla decorativa sutil -->
    <div class="pointer-events-none absolute inset-0 [background-image:linear-gradient(to_right,#6366f110_1px,transparent_1px),linear-gradient(to_bottom,#6366f110_1px,transparent_1px)] [background-size:40px_40px]"></div>

    <div class="relative max-w-3xl text-center" data-aos="fade-up">
      <span class="inline-block rounded-full bg-indigo-100 px-4 py-1.5 text-xs font-semibold text-indigo-700">Tu próximo proyecto, hoy</span>
      <h1 class="mt-6 text-4xl font-extrabold leading-tight tracking-tight sm:text-6xl">
        Construimos<br class="sm:hidden">
        <span class="text-indigo-600"><span id="typed"></span><span class="cursor">&nbsp;</span></span>
      </h1>
      <p class="mx-auto mt-6 max-w-xl text-lg text-slate-600">
        De la idea a la pantalla. Diseño, código y resultados que se notan.
      </p>
      <div class="mt-10 flex flex-col items-center justify-center gap-3 sm:flex-row">
        <a href="#" class="rounded-lg bg-indigo-600 px-7 py-3 font-semibold text-white shadow-sm transition hover:bg-indigo-700">Quiero el mío</a>
        <a href="#" class="rounded-lg border border-slate-300 px-7 py-3 font-semibold text-slate-700 transition hover:bg-slate-50">Ver trabajos</a>
      </div>
    </div>
  </section>

  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script>
    AOS.init({ duration: 700, once: true });
    // Efecto typewriter
    const words = ['webs que venden', 'apps a medida', 'marcas memorables', 'experiencias premium'];
    const el = document.getElementById('typed');
    let w = 0, c = 0, deleting = false;
    function type(){
      const current = words[w];
      el.textContent = current.substring(0, c);
      if(!deleting && c < current.length){ c++; setTimeout(type, 90); }
      else if(!deleting && c === current.length){ deleting = true; setTimeout(type, 1600); }
      else if(deleting && c > 0){ c--; setTimeout(type, 45); }
      else { deleting = false; w = (w+1) % words.length; setTimeout(type, 300); }
    }
    type();
  </script>
</body>
</html>
