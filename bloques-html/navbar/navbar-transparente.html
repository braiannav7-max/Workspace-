<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navbar — Transparente</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="text-slate-900 antialiased">

  <!-- ===== BLOQUE: navbar · variante transparente ===== -->
  <!-- Fuente: HyperUI (patrón header) · Licencia: MIT -->
  <!-- Empieza transparente sobre el hero; al scrollear se vuelve blanco con sombra. -->
  <header id="nav" class="fixed inset-x-0 top-0 z-50 transition-colors duration-300">
    <nav class="mx-auto flex max-w-7xl items-center justify-between px-6 py-4">
      <a href="#" id="brand" class="flex items-center gap-2 text-lg font-bold text-white transition-colors">
        <span class="grid h-8 w-8 place-content-center rounded-lg bg-white/20 backdrop-blur">M</span>
        Marca
      </a>
      <ul id="links" class="hidden items-center gap-8 text-sm font-medium text-white/90 transition-colors md:flex">
        <li><a href="#" class="transition hover:opacity-70">Inicio</a></li>
        <li><a href="#" class="transition hover:opacity-70">Servicios</a></li>
        <li><a href="#" class="transition hover:opacity-70">Precios</a></li>
        <li><a href="#" class="transition hover:opacity-70">Contacto</a></li>
      </ul>
      <a href="#" id="cta" class="rounded-lg bg-white/15 px-4 py-2 text-sm font-semibold text-white backdrop-blur transition hover:bg-white/25">Empezar</a>
    </nav>
  </header>

  <!-- Hero de fondo para ver el efecto transparente -->
  <section class="flex h-[70vh] items-center justify-center bg-gradient-to-br from-indigo-600 via-purple-600 to-pink-500 px-6 text-center">
    <div>
      <h1 class="text-4xl font-bold text-white sm:text-6xl">Navbar transparente</h1>
      <p class="mt-4 text-lg text-white/80">Scrolleá: el navbar se vuelve blanco con sombra.</p>
    </div>
  </section>
  <section class="mx-auto max-w-3xl px-6 py-24">
    <p class="text-slate-600">Contenido posterior. El navbar ahora es sólido y legible sobre fondo claro.</p>
  </section>

  <script>
    // Cambia el navbar de transparente a sólido al scrollear
    const nav = document.getElementById('nav');
    const links = document.getElementById('links');
    const brand = document.getElementById('brand');
    const cta = document.getElementById('cta');
    function onScroll() {
      const solid = window.scrollY > 40;
      nav.classList.toggle('bg-white', solid);
      nav.classList.toggle('shadow-md', solid);
      // texto: blanco sobre hero, oscuro cuando es sólido
      [brand, links].forEach(el => {
        el.classList.toggle('text-white', !solid);
        el.classList.toggle('text-white/90', !solid && el === links);
        el.classList.toggle('text-slate-800', solid);
      });
      cta.classList.toggle('bg-white/15', !solid);
      cta.classList.toggle('text-white', !solid);
      cta.classList.toggle('bg-indigo-600', solid);
      cta.classList.toggle('text-white', solid);
    }
    window.addEventListener('scroll', onScroll);
    onScroll();
  </script>

</body>
</html>
