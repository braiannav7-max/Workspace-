<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Testimonios — Carrusel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','ui-sans-serif','system-ui','sans-serif']}}}}</script>
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
</head>
<body class="bg-white text-slate-900 antialiased">

  <section class="mx-auto max-w-7xl px-6 py-20">
    <div class="mx-auto max-w-3xl text-center" data-aos="fade-up">
      <p class="text-sm font-semibold uppercase tracking-wide text-indigo-600">Testimonios</p>
      <h2 class="mt-2 text-3xl font-extrabold tracking-tight text-slate-900 sm:text-4xl">
        Historias de quienes ya confiaron
      </h2>
    </div>

    <div class="relative mx-auto mt-14 max-w-3xl" data-aos="fade-up" data-aos-delay="100">

      <!-- Slide -->
      <div class="text-center px-4">
        <div id="t-stars" class="mb-6 flex justify-center gap-1 text-yellow-400 transition-opacity duration-300">
          <!-- estrellas inyectadas por JS -->
        </div>
        <blockquote id="t-quote" class="text-xl font-medium leading-relaxed text-slate-800 transition-opacity duration-300 sm:text-2xl">
          <!-- quote -->
        </blockquote>
        <div class="mt-8 flex flex-col items-center transition-opacity duration-300" id="t-author">
          <img id="t-avatar" src="" alt="" class="h-16 w-16 rounded-full object-cover">
          <div class="mt-3 font-semibold text-slate-900" id="t-name"></div>
          <div class="text-sm text-slate-500" id="t-role"></div>
        </div>
      </div>

      <!-- Controles prev / next -->
      <button id="t-prev" type="button" aria-label="Anterior"
        class="absolute left-0 top-1/2 hidden -translate-y-1/2 rounded-full border border-slate-200 bg-white p-3 text-slate-600 shadow-sm transition hover:border-indigo-600 hover:text-indigo-600 sm:-left-4 sm:block">
        <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <button id="t-next" type="button" aria-label="Siguiente"
        class="absolute right-0 top-1/2 hidden -translate-y-1/2 rounded-full border border-slate-200 bg-white p-3 text-slate-600 shadow-sm transition hover:border-indigo-600 hover:text-indigo-600 sm:-right-4 sm:block">
        <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
      </button>

      <!-- Controles mobile + dots -->
      <div class="mt-10 flex items-center justify-center gap-6">
        <button id="t-prev-m" type="button" aria-label="Anterior"
          class="rounded-full border border-slate-200 bg-white p-2.5 text-slate-600 shadow-sm transition hover:border-indigo-600 hover:text-indigo-600 sm:hidden">
          <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <div id="t-dots" class="flex items-center gap-2">
          <!-- dots inyectados por JS -->
        </div>
        <button id="t-next-m" type="button" aria-label="Siguiente"
          class="rounded-full border border-slate-200 bg-white p-2.5 text-slate-600 shadow-sm transition hover:border-indigo-600 hover:text-indigo-600 sm:hidden">
          <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
        </button>
      </div>

    </div>
  </section>

  <script>
    // ===== Datos del carrusel (editá acá) =====
    var testimonios = [
      {
        quote: "Desde que empezamos a usar la plataforma, duplicamos nuestras conversiones en seis meses. El equipo de soporte estuvo a la altura en cada paso.",
        name: "Lucía Fernández",
        role: "CMO en Nubexa",
        avatar: "https://i.pravatar.cc/80?img=12",
        stars: 5
      },
      {
        quote: "Nunca habíamos tenido tanta claridad sobre nuestros números. Las decisiones ahora se toman con datos reales y no con intuición.",
        name: "Martín Gómez",
        role: "Founder en Velora",
        avatar: "https://i.pravatar.cc/80?img=33",
        stars: 5
      },
      {
        quote: "Migramos todo nuestro stack en una semana sin perder un solo cliente. La experiencia fue mucho más fluida de lo que esperábamos.",
        name: "Sofía Ramírez",
        role: "Head of Product en Kinto",
        avatar: "https://i.pravatar.cc/80?img=45",
        stars: 5
      },
      {
        quote: "Escalamos de 10 a 100 clientes sin fricción. La herramienta se adaptó a cada etapa de nuestro crecimiento sin sorpresas.",
        name: "Valentina Ruiz",
        role: "CEO en Lumina",
        avatar: "https://i.pravatar.cc/80?img=60",
        stars: 5
      }
    ];

    var STAR_SVG = '<svg class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M9.05 2.927c.3-.921 1.603-.921 1.902 0l1.286 3.957a1 1 0 00.95.69h4.162c.969 0 1.371 1.24.588 1.81l-3.367 2.446a1 1 0 00-.364 1.118l1.287 3.957c.3.921-.755 1.688-1.54 1.118l-3.366-2.446a1 1 0 00-1.175 0l-3.367 2.446c-.784.57-1.838-.197-1.539-1.118l1.286-3.957a1 1 0 00-.363-1.118L2.354 9.384c-.783-.57-.38-1.81.588-1.81h4.162a1 1 0 00.951-.69l1.286-3.957z"/></svg>';

    var current = 0;
    var quoteEl  = document.getElementById('t-quote');
    var starsEl  = document.getElementById('t-stars');
    var avatarEl = document.getElementById('t-avatar');
    var nameEl   = document.getElementById('t-name');
    var roleEl   = document.getElementById('t-role');
    var authorEl = document.getElementById('t-author');
    var dotsEl   = document.getElementById('t-dots');

    // Construir dots
    testimonios.forEach(function (t, i) {
      var dot = document.createElement('button');
      dot.type = 'button';
      dot.setAttribute('aria-label', 'Ir al testimonio ' + (i + 1));
      dot.className = 'h-2.5 w-2.5 rounded-full transition-colors';
      dot.addEventListener('click', function () { goTo(i); });
      dotsEl.appendChild(dot);
    });
    var dots = dotsEl.querySelectorAll('button');

    function render() {
      var t = testimonios[current];
      // fade out
      quoteEl.style.opacity = '0';
      starsEl.style.opacity = '0';
      authorEl.style.opacity = '0';

      setTimeout(function () {
        quoteEl.textContent = '"' + t.quote + '"';
        starsEl.innerHTML = new Array(t.stars + 1).join(STAR_SVG);
        avatarEl.src = t.avatar;
        avatarEl.alt = 'Avatar de ' + t.name;
        nameEl.textContent = t.name;
        roleEl.textContent = t.role;

        dots.forEach(function (d, i) {
          if (i === current) {
            d.classList.add('bg-indigo-600');
            d.classList.remove('bg-slate-300');
          } else {
            d.classList.add('bg-slate-300');
            d.classList.remove('bg-indigo-600');
          }
        });

        // fade in
        quoteEl.style.opacity = '1';
        starsEl.style.opacity = '1';
        authorEl.style.opacity = '1';
      }, 200);
    }

    function goTo(i) {
      current = (i + testimonios.length) % testimonios.length;
      render();
    }
    function next() { goTo(current + 1); }
    function prev() { goTo(current - 1); }

    document.getElementById('t-next').addEventListener('click', next);
    document.getElementById('t-prev').addEventListener('click', prev);
    document.getElementById('t-next-m').addEventListener('click', next);
    document.getElementById('t-prev-m').addEventListener('click', prev);

    render();
  </script>

  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script>AOS.init({ duration: 600, once: true });</script>
</body>
</html>
